kind = "web"
previewPath = "/"
title = "Mumbai Dynamic Transit"
version = "1.0.0"
id = "artifacts/mdt-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20881

[services.development]
run = "pnpm --filter @workspace/mdt-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mdt-app", "run", "build" ]
publicDir = "artifacts/mdt-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20881"
BASE_PATH = "/"
